jobs:
  - ${{ each pool in parameters.pools }}:
    - ${{ each project in parameters.projects }}:
      - ${{ each configuration in parameters.configurations }}:
        - job:
          displayName: ${{ format('{0} {1} {2}', pool.name, project, configuration) }}
          timeoutInMinutes: 120
          pool:
            vmImage: ${{ pool.vmImage }}
          steps:
            - task: UseDotNet@2
              displayName: Use .NET SDK from global.json
              inputs:
                useGlobalJson: true
                performMultiLevelLookup: true

            - powershell: |
                $existing = & dotnet tool list -g | Select-String "nbgv" 
                if (!$existing) {
                    & dotnet tool install -g nbgv
                }
              displayName: Install NBGV tool

            - script: nbgv cloud -a
              displayName: Set Version

            - task: DotNetCoreCLI@2
              inputs:
                command: custom
                custom: tool
                arguments: install -g dotnet-reportgenerator-globaltool
              displayName: Install ReportGenerator tool

            # Tests run on Microsoft.Testing.Platform (see global.json "test.runner"). VSTest-style
            # arguments are translated to their MTP equivalents: --collect "XPlat Code Coverage" ->
            # --coverage (Microsoft.Testing.Extensions.CodeCoverage), --blame-hang-timeout ->
            # --hangdump-timeout, coverlet.runsettings -> codecoverage.runsettings. --filter is unchanged.
            - task: DotNetCoreCLI@2
              inputs:
                command: test
                workingDirectory: ${{ project }}
                arguments: -c ${{ configuration }} /bl:$(Build.ArtifactStagingDirectory)/Logs/${{ pool.name }}.${{ project }}.${{ configuration }}.Test.binlog --results-directory $(Agent.TempDirectory)/TestResults --filter "TestCategory!~NonDeterministic_Strong" --coverage --coverage-settings $(Build.SourcesDirectory)/codecoverage.runsettings --coverage-output-format cobertura --hangdump --hangdump-timeout 5m
                testRunTitle: ${{ project }} ${{ configuration }}
              displayName: Run Unit Tests

            - script: reportgenerator -reports:$(Agent.TempDirectory)/**/*.cobertura.xml -sourcedirs:$(Build.SourcesDirectory) -targetdir:$(Build.ArtifactStagingDirectory)/coverage/${{ pool.name }}.${{ project }}.${{ configuration }} -reporttypes:"Cobertura"
              displayName: Consolidate Coverage Runs
              condition: succeededOrFailed()

            - task: PublishBuildArtifacts@1
              inputs:
                pathToPublish: $(Build.ArtifactStagingDirectory)/coverage
                artifactName: RawCoverage
                parallel: true
                parallelCount: 8
              displayName: Publish Raw Coverage Output
              condition: succeededOrFailed()

            - task: PublishBuildArtifacts@1
              inputs:
                pathToPublish: $(Build.ArtifactStagingDirectory)/Logs
                artifactName: Logs
                parallel: true
                parallelCount: 8
              displayName: Publish Build Logs
              condition: always()
